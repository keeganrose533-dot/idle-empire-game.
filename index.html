<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Earth Digital Twin Explorer</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cesium/1.118/Widgets/widgets.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <aside id="control-panel" aria-label="Digital twin controls">
      <h1>Earth Digital Twin</h1>
      <p>
        Smoothly zoom from orbit to city streets with free global map data.
      </p>

      <label for="city-select">Jump to location</label>
      <select id="city-select">
        <option value="">Select a place...</option>
      </select>

      <div class="button-row">
        <button id="outer-space-btn" type="button">Outer Space</button>
        <button id="street-level-btn" type="button">Street Level</button>
      </div>

      <label class="toggle-row" for="buildings-toggle">
        <input id="buildings-toggle" type="checkbox" checked />
        3D Buildings
      </label>

      <div id="status" role="status" aria-live="polite"></div>

      <small>
        Layers: OpenStreetMap imagery + optional Cesium terrain (free public layers). Lite mode is always enabled for smooth performance.
      </small>
    </aside>

    <main id="viewer" aria-label="3D globe viewer"></main>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/cesium/1.118/Cesium.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="script.js"></script>
</body>
</html>
