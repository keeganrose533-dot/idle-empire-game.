<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Earth Digital Twin Explorer</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cesium/1.118/Widgets/widgets.min.css" integrity="sha512-oyg0bbM7qM2uIy9mA+k4l92M+MElg8XnFAm3S4P2CVixKz5K6J32+iy8VjQfVf6hW0/DMR0LvygIolM4d5IsNw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <aside id="control-panel" aria-label="Digital twin controls">
      <h1>Earth Digital Twin</h1>
      <p>
        Smoothly zoom from orbit to city streets with free global map data.
      </p>

      <label for="city-select">Jump to location</label>
      <select id="city-select">
        <option value="">Select a place...</option>
      </select>

      <div class="button-row">
        <button id="outer-space-btn" type="button">Outer Space View</button>
        <button id="street-level-btn" type="button">Street-Level View</button>
      </div>

      <label class="toggle-row" for="buildings-toggle">
        <input id="buildings-toggle" type="checkbox" checked />
        3D Buildings
      </label>

      <div id="status" role="status" aria-live="polite"></div>

      <small>
        Data layers: OpenStreetMap imagery + Cesium global terrain/buildings (free public layers).
      </small>
    </aside>

    <main id="viewer" aria-label="3D globe viewer"></main>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/cesium/1.118/Cesium.min.js" integrity="sha512-5W7M9z9xEmTnFV4R6M7rAhTci2nH7Wq4u4DnU9lXBha8jCvKSs9qK5ROtgx5EwEaf43lvw7V+xmTB0/PnjD8sg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="script.js"></script>
</body>
</html>
